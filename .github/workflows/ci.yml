name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # NumPy core across supported Python versions (no torch involved). torch tests
  # skip here via pytest.importorskip; the cmaes cross-validation runs.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[test]"
      - run: pytest -q

  # The torch backend is only validated on a real GPU. Requires a self-hosted
  # runner with the `gpu` label on the GPU machine. Gated to pushes on this repo
  # so a fork PR can never execute on the self-hosted box.
  test-torch-gpu:
    if: github.event_name == 'push' && github.repository == 'AI-Safeter/FUGU'
    runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v4
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[test]" torch     # CUDA wheels (default on a GPU box)
      - run: python -c "import torch; assert torch.cuda.is_available(), 'self-hosted runner has no CUDA GPU'"
      - run: pytest -q                           # full suite incl. the CUDA tests
