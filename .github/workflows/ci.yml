name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Core suite across supported Python versions. torch is not installed here,
  # so the torch tests skip (via pytest.importorskip) and the numpy path + the
  # cmaes cross-validation run.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[test]"
      - run: pytest -q

  # Full suite including the PyTorch backend, on CPU wheels.
  test-torch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[test]"
      - run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - run: pytest -q
